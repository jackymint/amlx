name: Release & Update Formula

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      sha256: ${{ steps.sha.outputs.sha256 }}
      tarball_url: ${{ steps.meta.outputs.tarball_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO="${{ github.repository }}"
          TARBALL_URL="https://github.com/${REPO}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tarball_url=${TARBALL_URL}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes

      - name: Compute tarball SHA256
        id: sha
        run: |
          curl -fsSL "${{ steps.meta.outputs.tarball_url }}" -o release.tar.gz
          SHA256=$(sha256sum release.tar.gz | awk '{print $1}')
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

  update-formula:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Formula/amlx.rb
        env:
          SHA256: ${{ needs.release.outputs.sha256 }}
          TARBALL_URL: ${{ needs.release.outputs.tarball_url }}
          VERSION: ${{ needs.release.outputs.version }}
        run: python3 .github/scripts/update_formula.py

      - name: Commit and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/amlx.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date."
            exit 0
          fi
          BRANCH="chore/formula-v${VERSION}"
          git checkout -b "$BRANCH"
          git commit -m "formula: bump to v${VERSION}"
          git push origin "$BRANCH"
          gh pr create \
            --title "formula: bump to v${VERSION}" \
            --body "Auto-generated: updates Formula/amlx.rb url and sha256 for v${VERSION}." \
            --base main \
            --head "$BRANCH" || true
          gh pr merge "$BRANCH" --merge --auto || true
