name: Release & Update Formula

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tarball_url: ${{ steps.meta.outputs.tarball_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version and create release
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO="${{ github.repository }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tarball_url=https://github.com/${REPO}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz" >> "$GITHUB_OUTPUT"
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes

  build-binary:
    needs: release
    runs-on: macos-15
    outputs:
      binary_sha256: ${{ steps.binary.outputs.sha256 }}
      binary_url: ${{ steps.binary.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        run: |
          brew install python@3.12 || true
          python3.12 -m pip install --upgrade pip

      - name: Install dependencies and PyInstaller
        run: |
          python3.12 -m pip install -e '.[mlx]' pyinstaller

      - name: Build binary
        run: |
          python3.12 -m PyInstaller amlx.spec --distpath dist --workpath /tmp/pyinstaller-work

      - name: Package binary
        id: binary
        env:
          VERSION: ${{ needs.release.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSET="amlx-${VERSION}-macos-arm64.tar.gz"
          tar czf "$ASSET" -C dist amlx
          SHA256=$(shasum -a 256 "$ASSET" | awk '{print $1}')
          URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/${ASSET}"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          gh release upload "v${VERSION}" "$ASSET"

  update-formula:
    needs: [release, build-binary]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Formula/amlx.rb
        env:
          VERSION: ${{ needs.release.outputs.version }}
          BINARY_SHA256: ${{ needs.build-binary.outputs.binary_sha256 }}
          BINARY_URL: ${{ needs.build-binary.outputs.binary_url }}
        run: python3 .github/scripts/update_formula.py

      - name: Commit and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/amlx.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date."
            exit 0
          fi
          BRANCH="chore/formula-v${VERSION}"
          git checkout -b "$BRANCH"
          git commit -m "formula: bump to v${VERSION}"
          git push origin "$BRANCH"
          gh pr create \
            --title "formula: bump to v${VERSION}" \
            --body "Auto-generated: updates Formula/amlx.rb binary url and sha256 for v${VERSION}." \
            --base main \
            --head "$BRANCH" || true
          gh pr merge "$BRANCH" --merge --auto || true
