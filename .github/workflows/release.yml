name: Release & Update Formula

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      source_url: ${{ steps.meta.outputs.source_url }}
      source_sha256: ${{ steps.meta.outputs.source_sha256 }}

    steps:
      - uses: actions/checkout@v4

      - name: Create release and compute source sha256
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO="${{ github.repository }}"
          SOURCE_URL="https://github.com/${REPO}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"

          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes

          curl -fsSL "${SOURCE_URL}" -o source.tar.gz
          SHA256=$(shasum -a 256 source.tar.gz | awk '{print $1}')

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "source_url=${SOURCE_URL}" >> "$GITHUB_OUTPUT"
          echo "source_sha256=${SHA256}" >> "$GITHUB_OUTPUT"

  update-formula:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Formula/amlx.rb
        env:
          VERSION: ${{ needs.release.outputs.version }}
          SOURCE_URL: ${{ needs.release.outputs.source_url }}
          SOURCE_SHA256: ${{ needs.release.outputs.source_sha256 }}
        run: python3 .github/scripts/update_formula.py

      - name: Commit and push directly to main
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/amlx.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date."
            exit 0
          fi
          git commit -m "formula: bump to v${VERSION}"
          git push origin main
