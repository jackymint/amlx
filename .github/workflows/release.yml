name: Release & Update Formula

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      sha256: ${{ steps.sha.outputs.sha256 }}
      tarball_url: ${{ steps.meta.outputs.tarball_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO="${{ github.repository }}"
          TARBALL_URL="https://github.com/${REPO}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tarball_url=${TARBALL_URL}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Compute tarball SHA256
        id: sha
        run: |
          curl -fsSL "${{ steps.meta.outputs.tarball_url }}" -o release.tar.gz
          SHA256=$(sha256sum release.tar.gz | awk '{print $1}')
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

  update-formula:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Formula/amlx.rb
        env:
          VERSION: ${{ needs.release.outputs.version }}
          SHA256: ${{ needs.release.outputs.sha256 }}
          TARBALL_URL: ${{ needs.release.outputs.tarball_url }}
        run: |
          python3 - <<'EOF'
          import os, re

          formula_path = "Formula/amlx.rb"
          url     = os.environ["TARBALL_URL"]
          sha256  = os.environ["SHA256"]

          with open(formula_path) as f:
              text = f.read()

          # Replace tarball url line
          text = re.sub(
              r'(  url "https://github\.com/[^/]+/amlx/archive/refs/tags/v)[^"]*(")',
              lambda m: f'  url "{url}"',
              text,
          )

          # Replace the sha256 that immediately follows the tarball url
          text = re.sub(
              r'(  url "https://github\.com/[^"]+\.tar\.gz"\n  sha256 )"[^"]*"',
              rf'\1"{sha256}"',
              text,
          )

          with open(formula_path, "w") as f:
              f.write(text)

          print(f"Updated formula → {url}")
          print(f"sha256 → {sha256}")
          EOF

      - name: Commit updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/amlx.rb
          git diff --cached --quiet || git commit -m "formula: bump to v${{ needs.release.outputs.version }}"
          git push
