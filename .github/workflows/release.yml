name: Release & Update Formula

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      sha256: ${{ steps.sha.outputs.sha256 }}
      tarball_url: ${{ steps.meta.outputs.tarball_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO="${{ github.repository }}"
          TARBALL_URL="https://github.com/${REPO}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tarball_url=${TARBALL_URL}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes

      - name: Compute tarball SHA256
        id: sha
        run: |
          curl -fsSL "${{ steps.meta.outputs.tarball_url }}" -o release.tar.gz
          SHA256=$(sha256sum release.tar.gz | awk '{print $1}')
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

  build-bottle:
    needs: release
    runs-on: macos-15
    outputs:
      bottle_file: ${{ steps.bottle.outputs.file }}

    steps:
      - uses: actions/checkout@v4

      - name: Update formula url + sha256 for this release
        env:
          SHA256: ${{ needs.release.outputs.sha256 }}
          TARBALL_URL: ${{ needs.release.outputs.tarball_url }}
          VERSION: ${{ needs.release.outputs.version }}
        run: python3 .github/scripts/update_formula.py

      - name: Tap repo and override formula
        run: |
          brew tap jackymint/amlx https://github.com/jackymint/amlx
          cp Formula/amlx.rb $(brew --repo jackymint/amlx)/Formula/amlx.rb

      - name: Install (build-bottle mode)
        run: brew install --build-bottle jackymint/amlx/amlx

      - name: Build bottle
        id: bottle
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          brew bottle --json \
            --root-url "https://github.com/jackymint/amlx/releases/download/v${VERSION}" \
            jackymint/amlx/amlx
          echo "file=$(ls *.tar.gz | head -1)" >> "$GITHUB_OUTPUT"

      - name: Upload bottle to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" *.tar.gz

      - name: Upload bottle JSON as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bottle-json
          path: "*.json"

  update-formula:
    needs: [release, build-bottle]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update formula url + sha256
        env:
          SHA256: ${{ needs.release.outputs.sha256 }}
          TARBALL_URL: ${{ needs.release.outputs.tarball_url }}
          VERSION: ${{ needs.release.outputs.version }}
        run: python3 .github/scripts/update_formula.py

      - name: Download bottle JSON
        uses: actions/download-artifact@v4
        with:
          name: bottle-json

      - name: Merge bottle block into formula
        run: python3 .github/scripts/merge_bottle.py

      - name: Commit and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/amlx.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date, skipping PR."
            exit 0
          fi
          BRANCH="chore/formula-v${VERSION}"
          git checkout -b "$BRANCH"
          git commit -m "formula: bump to v${VERSION} with bottle"
          git push origin "$BRANCH"
          gh pr create \
            --title "formula: bump to v${VERSION} with bottle" \
            --body "Auto-generated by release workflow. Updates formula url, sha256, and bottle block for v${VERSION}." \
            --base main \
            --head "$BRANCH" || true
          gh pr merge "$BRANCH" --merge --auto || true
